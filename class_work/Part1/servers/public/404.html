<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Not Found</title>
    <style>
      /* Basic styling */
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #333;
      }
      h1 {
        font-size: 72px;
        margin-bottom: 20px;
      }
      p {
        font-size: 24px;
      }
      /* Animation */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      body {
        animation: fadeIn 2s ease-in-out;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>404</h1>
      <p>Page Not Found</p>
    </div>
  </body>
</html>
